name: Build and push layer images

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # Detect which layers have changed so each build job can decide whether to run.
  # For tag pushes and workflow_dispatch the per-layer conditions below force all
  # layers to rebuild regardless of what this job reports.
  filter:
    name: Detect changed layers
    runs-on: ubuntu-latest
    outputs:
      git: ${{ steps.paths.outputs.git }}
      gpg: ${{ steps.paths.outputs.gpg }}
      fwupd: ${{ steps.paths.outputs.fwupd }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: paths
        with:
          filters: |
            git:
              - 'git/**'
              - 'docker-bake.hcl'
              - '.github/workflows/build.yml'
            gpg:
              - 'gpg/**'
              - 'docker-bake.hcl'
              - '.github/workflows/build.yml'
            fwupd:
              - 'fwupd/**'
              - 'docker-bake.hcl'
              - '.github/workflows/build.yml'

  build-git:
    name: Build git layer
    runs-on: ubuntu-latest
    needs: filter
    if: |
      needs.filter.outputs.git == 'true' ||
      github.event_name == 'workflow_dispatch' ||
      github.ref_type == 'tag'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract software version
        id: version
        run: echo "value=$(grep -m1 'ARG GIT_VERSION=' git/Dockerfile | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push git layer
        uses: docker/bake-action@v6
        with:
          targets: git
          push: ${{ github.event_name != 'pull_request' }}
          set: |
            *.cache-from=type=gha,scope=git
            *.cache-to=type=gha,scope=git,mode=max
        env:
          TAG: ${{ steps.version.outputs.value }}

  build-gpg:
    name: Build gpg layer
    runs-on: ubuntu-latest
    needs: filter
    if: |
      needs.filter.outputs.gpg == 'true' ||
      github.event_name == 'workflow_dispatch' ||
      github.ref_type == 'tag'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract software version
        id: version
        run: echo "value=$(grep -m1 'ARG GNUPG_VERSION=' gpg/Dockerfile | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push gpg layer
        uses: docker/bake-action@v6
        with:
          targets: gpg
          push: ${{ github.event_name != 'pull_request' }}
          set: |
            *.cache-from=type=gha,scope=gpg
            *.cache-to=type=gha,scope=gpg,mode=max
        env:
          TAG: ${{ steps.version.outputs.value }}

  build-fwupd:
    name: Build fwupd layer
    runs-on: ubuntu-latest
    needs: filter
    if: |
      needs.filter.outputs.fwupd == 'true' ||
      github.event_name == 'workflow_dispatch' ||
      github.ref_type == 'tag'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract software version
        id: version
        run: echo "value=$(grep -m1 'ARG FWUPD_VERSION=' fwupd/Dockerfile | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push fwupd layer
        uses: docker/bake-action@v6
        with:
          targets: fwupd
          push: ${{ github.event_name != 'pull_request' }}
          set: |
            *.cache-from=type=gha,scope=fwupd
            *.cache-to=type=gha,scope=fwupd,mode=max
        env:
          TAG: ${{ steps.version.outputs.value }}
